baseURL = 'https://khaled2049.github.io/devlog'
languageCode = 'en-us'
title = 'Khaled in Progress'
theme = 'PaperMod'

[params]
  env = "production"
  description = "Building things, breaking things, writing about it"
  author = "Khaled"
  defaultTheme = "dark"

  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true

  [params.homeInfoParams]
    Title = "Hey, I'm Khaled"
    Content = "Software engineer building in public. Writing about code, side projects, and whatever else is on my mind. Currently heads down on TaleTribe."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/khaled2049"

  [params.assets]
    disableHLJS = false
    disableFingerprinting = false

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    noClasses = false
    style = "monokai"